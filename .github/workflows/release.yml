name: release

# NOTE: GitHub Actions is not enabled on this repository (it costs money on this account),
# so this workflow is DORMANT — it won't run as-is. It's committed as a ready-to-go scaffold:
# enable Actions (or fork the repo), then push a `v*` tag (or run it manually) to build the
# renderer for Windows + Linux + macOS and attach the binaries to the matching GitHub release.
#
# PhysX is OFF in CI (it's a vendored Windows-only .lib); the cooker uses the device-compatible
# ColliderBox grid, so a PhysX-free build is fully functional.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            bin: hsr_renderer.exe
            out: hsr_renderer-windows-x64.exe
          - os: ubuntu-latest
            name: linux-x64
            bin: hsr_renderer
            out: hsr_renderer-linux-x64
          - os: macos-latest
            name: macos-arm64
            bin: hsr_renderer
            out: hsr_renderer-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Linux deps (Vulkan loader + GLFW/X11/Wayland)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libvulkan-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev pkg-config

      - name: macOS deps (Ninja + MoltenVK)
        if: runner.os == 'macOS'
        run: brew install ninja molten-vk vulkan-loader vulkan-headers

      - name: MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Configure (PhysX off → cross-platform)
        run: cmake -S hsr_renderer_cpp -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DHSR_HAVE_PHYSX=OFF

      - name: Build (renderer/editor only)
        run: cmake --build build --target hsr_renderer

      - name: Package
        shell: bash
        run: |
          mkdir -p "dist"
          cp "build/${{ matrix.bin }}" "dist/${{ matrix.out }}"
          # Linux/macOS have no Segoe/Arial fallback — ship the open-source UI font beside the binary.
          mkdir -p "dist/third_party/fonts"
          cp hsr_renderer_cpp/third_party/fonts/InterVariable.ttf "dist/third_party/fonts/" || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: dist

      - name: Attach to the tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.out }}
